<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TF Arrecada+</title>
    <!-- 
      Script de redirecionamento para SPA no GitHub Pages.
      Quando o GitHub Pages retorna 404 para rotas do React Router,
      este arquivo redireciona o usuário de volta ao index.html
      com o path original preservado como query string.
    -->
    <script>
      var pathSegmentsToKeep = 1; // Número de segmentos do base path (1 = /TF-Arrecada-/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
